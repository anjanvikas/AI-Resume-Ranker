<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — ResumeRank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #fafafa;
            --card: #fff;
            --text: #1d1d1f;
            --text2: #6e6e73;
            --border: #e5e5ea;
            --accent: #0071e3;
            --radius: 16px;
            --font: 'Inter', -apple-system, sans-serif;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --card: #1c1c1e;
            --text: #f5f5f7;
            --text2: #a1a1a6;
            --border: #38383a;
            --accent: #0a84ff;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            transition: background 0.3s, color 0.3s;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
        }

        .theme-toggle:hover {
            background: var(--border);
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 48px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 32px;
        }

        .login-logo svg {
            flex-shrink: 0;
        }

        .login-logo span {
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 0.9375rem;
            color: var(--text2);
            margin-bottom: 36px;
            line-height: 1.6;
        }

        .google-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 28px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--card);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .google-btn:hover {
            background: var(--bg);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .google-btn svg {
            flex-shrink: 0;
        }

        .login-footer {
            margin-top: 32px;
            font-size: 0.75rem;
            color: var(--text2);
        }
    </style>
</head>

<body>
    <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">🌙</button>
    <div class="login-card">
        <div class="login-logo">
            <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
                <rect width="28" height="28" rx="7" fill="url(#lg)" />
                <path d="M8 14L12 18L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round" />
                <defs>
                    <linearGradient id="lg" x1="0" y1="0" x2="28" y2="28">
                        <stop stop-color="#6366f1" />
                        <stop offset="1" stop-color="#8b5cf6" />
                    </linearGradient>
                </defs>
            </svg>
            <span>ResumeRank</span>
        </div>
        <h1 class="login-title">Welcome back</h1>
        <p class="login-subtitle">Sign in to rank resumes with AI.<br>Your API keys are encrypted and stored securely.
        </p>
        <a href="/auth/login" class="google-btn">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                    fill="#4285F4" />
                <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853" />
                <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    fill="#FBBC05" />
                <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335" />
            </svg>
            Continue with Google
        </a>
        <p class="login-footer">Your data stays private. We only store your email and encrypted keys.</p>
    </div>
    <script>
        const toggle = document.getElementById('theme-toggle');
        const saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        toggle.textContent = saved === 'dark' ? '☀️' : '🌙';
        toggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            toggle.textContent = next === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', next);
        });
    </script>
</body>

</html>
